services:
  badge83:
    build:
      context: .
      dockerfile: Dockerfile
    image: badge83:prod
    restart: unless-stopped
    expose:
      - "8000"
    env_file:
      - .env
    volumes:
      - ./runtime-data:/app/data
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:8000/issuers/main"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s

  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    depends_on:
      badge83:
        condition: service_healthy
    ports:
      - "80:80"
      - "443:443"
    environment:
      BADGE83_DOMAIN: ${BADGE83_DOMAIN}
    volumes:
      - ./docker/nginx/templates:/etc/nginx/templates:ro
      - ./docker/nginx/certs:/etc/nginx/certs:ro