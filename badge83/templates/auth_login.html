<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Badge83 — Connexion</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
    <style>
      :root {
        --bg: #eef3f9;
        --panel: #ffffff;
        --border: #dbe5f0;
        --text: #0f172a;
        --muted: #5b6b80;
      }

      body {
        min-height: 100vh;
        background:
          radial-gradient(circle at top left, rgba(37, 99, 235, 0.16), transparent 34rem),
          linear-gradient(135deg, #eef3f9 0%, #f8fbff 100%);
        color: var(--text);
      }

      .login-shell {
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 1.5rem;
      }

      .login-card {
        width: min(100%, 460px);
        background: var(--panel);
        border: 1px solid var(--border);
        border-radius: 1.25rem;
        box-shadow: 0 1rem 2rem rgba(15, 23, 42, 0.10);
      }

      .form-control,
      .btn-primary {
        border-radius: 0.85rem;
        padding: 0.75rem 0.9rem;
      }

      .login-note {
        color: var(--muted);
        font-size: 0.9rem;
      }
    </style>
  </head>
  <body>
    <main class="login-shell">
      <section class="login-card p-4 p-md-5">
        <div class="d-flex gap-2 align-items-center mb-3">
          <span class="badge text-bg-dark">Badge83</span>
          <span class="badge text-bg-primary">Accès protégé</span>
        </div>

        <h1 class="h3 mb-2">Connexion administrateur</h1>
        <p class="login-note mb-4">Authentification requise avant l’ouverture de l’espace de travail.</p>

        {% if error %}
          <div class="alert alert-danger" role="alert">{{ error }}</div>
        {% endif %}

        <form method="post" action="/auth/login" autocomplete="on">
          <input type="hidden" name="next_url" value="{{ next_url }}" />
          <div class="mb-3">
            <label for="username" class="form-label fw-semibold">Identifiant</label>
            <input id="username" name="username" type="text" class="form-control" autocomplete="username" required autofocus />
          </div>
          <div class="mb-4">
            <label for="password" class="form-label fw-semibold">Mot de passe</label>
            <input id="password" name="password" type="password" class="form-control" autocomplete="current-password" required />
          </div>
          <button type="submit" class="btn btn-primary w-100">Se connecter</button>
        </form>
      </section>
    </main>
  </body>
</html>
