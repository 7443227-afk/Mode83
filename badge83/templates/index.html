<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Badge 83</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
  </head>
  <body class="bg-light">
    <main class="container py-5">
      <section class="mb-4">
        <h1 class="mb-2">Badge 83</h1>
        <p class="text-muted mb-0">Implémentation simple d'Open Badges pour émettre et vérifier des assertions MODE83.</p>
      </section>

      <section class="row g-4 mb-4">
        <div class="col-12 col-md-6">
          <div class="card shadow-sm h-100">
            <div class="card-body">
              <h2 class="h5 mb-3">Émettre une assertion Open Badge</h2>
          <form id="issueForm" method="post" action="/issue">
                <div class="mb-3">
                  <label for="name" class="form-label">Nom</label>
                  <input id="name" type="text" name="name" class="form-control" required />
                </div>
                <div class="mb-3">
                  <label for="email" class="form-label">Email</label>
                  <input id="email" type="email" name="email" class="form-control" required />
                </div>
                <button type="submit" class="btn btn-primary">Émettre</button>
          </form>
            </div>
          </div>
        </div>

        <div class="col-12 col-md-6">
          <div class="card shadow-sm h-100">
            <div class="card-body">
              <h2 class="h5 mb-3">Vérifier une assertion</h2>
          <form id="verifyForm" method="get" action="/verify">
                <div class="mb-3">
                  <label for="badgeId" class="form-label">Badge ID</label>
                  <input
                    type="text"
                    id="badgeId"
                    name="badge_id"
                    class="form-control"
                    placeholder="Entrez un identifiant"
                  />
                </div>
                <button type="submit" class="btn btn-outline-primary">Vérifier</button>
          </form>
            </div>
          </div>
        </div>
      </section>

      <section class="card shadow-sm">
        <div class="card-body">
          <h2 class="h5 mb-3">Résultat JSON</h2>
          <pre id="result" class="bg-dark text-light rounded p-3 mb-0" style="min-height: 160px">En attente d'action...</pre>
        </div>
      </section>
    </main>

    <script>
      const issueForm = document.getElementById('issueForm');
      const verifyForm = document.getElementById('verifyForm');
      const badgeIdInput = document.getElementById('badgeId');
      const resultBox = document.getElementById('result');

      function showResult(data) {
        resultBox.textContent = JSON.stringify(data, null, 2);
      }

      issueForm.addEventListener('submit', async (event) => {
        event.preventDefault();
        const formData = new FormData(issueForm);

        const response = await fetch('/issue', {
          method: 'POST',
          body: formData,
        });

        const data = await response.json();
        showResult(data);

        if (data.badge?.assertion_id) {
          badgeIdInput.value = data.badge.assertion_id;
        }
      });

      verifyForm.addEventListener('submit', async (event) => {
        event.preventDefault();
        const badgeId = badgeIdInput.value.trim();
        const response = await fetch(`/verify?badge_id=${encodeURIComponent(badgeId)}`);
        const data = await response.json();
        showResult(data);
      });
    </script>
  </body>
</html>
